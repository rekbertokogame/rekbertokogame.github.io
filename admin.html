<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | REKBER.TOKOGAME</title>
  <meta name="theme-color" content="#ff1e1e" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="admin-wrap">
    <section class="panel">
      <h1>Admin Panel</h1>
      <p class="sub">Edit link dan brand langsung dari HP</p>

      <div class="field">
        <label for="title">Judul Brand</label>
        <input id="title" type="text" placeholder="REKBER.TOKOGAME" />
      </div>

      <div class="field">
        <label for="subtitle">Subtitle</label>
        <input id="subtitle" type="text" placeholder="Trusted Gaming & Digital Escrow" />
      </div>

      <div class="field">
        <label for="avatar">Avatar URL</label>
        <input id="avatar" type="text" placeholder="https://..." />
      </div>

      <div class="field">
        <label for="background">Background URL</label>
        <input id="background" type="text" placeholder="https://..." />
      </div>

      <div class="actions-top">
        <button onclick="saveAll()">Simpan Brand</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Daftar Link</h2>
        <button class="add-btn" onclick="addLink()">+ Tambah Link</button>
      </div>

      <div id="links"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
